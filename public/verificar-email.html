<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Jiu-Jitsu — Verificação de E-mail</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.card{background:#fff;border-radius:16px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);text-align:center}
.card-header{background:#000;padding:28px 32px 20px}
.logo-img{width:120px;height:120px;object-fit:contain}
.logo-fallback{font-size:26px;font-weight:900;color:#fff;letter-spacing:3px}
.card-body{padding:32px 28px}
.icon{font-size:48px;margin-bottom:16px}
h2{font-size:20px;font-weight:700;color:#222;margin-bottom:8px}
p{font-size:14px;color:#666;line-height:1.6;margin-bottom:24px}
.btn{display:inline-block;padding:12px 28px;background:#C0392B;color:#fff;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;text-transform:uppercase;letter-spacing:.07em}
.btn:hover{background:#a93226}
.btn-outline{display:inline-block;padding:12px 28px;border:2px solid #222;color:#222;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;margin-top:10px}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <img class="logo-img" src="/logo.jpeg" alt="Alpha" onerror="this.style.display='none';document.getElementById('lft').style.display='block'">
    <div id="lft" style="display:none"><div class="logo-fallback">ALPHA</div></div>
  </div>
  <div class="card-body" id="body"></div>
</div>
<script>
const params = new URLSearchParams(location.search);
const status = params.get('status');
const body = document.getElementById('body');
if (status === 'ok') {
  body.innerHTML = `
    <div class="icon">✅</div>
    <h2>E-mail confirmado!</h2>
    <p>Sua conta está ativa. Agora você pode fazer login.</p>
    <a class="btn" href="/">Fazer login</a>`;
} else {
  body.innerHTML = `
    <div class="icon">❌</div>
    <h2>Link inválido</h2>
    <p>Este link de verificação é inválido ou já foi utilizado.</p>
    <a class="btn" href="/">Ir para o login</a>`;
}
</script>
</body>
</html>
