<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Jiu-Jitsu — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.card{background:#fff;border-radius:16px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.card-header{background:#000;padding:32px 32px 24px;text-align:center}
.logo-img{width:200px;height:200px;object-fit:contain;margin-bottom:8px}
.logo-fallback{font-size:36px;font-weight:900;color:#fff;letter-spacing:3px;line-height:1}
.logo-sub{font-size:10px;color:#666;letter-spacing:4px;text-transform:uppercase;margin-top:4px}
.card-body{padding:28px 32px 32px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input{width:100%;padding:11px 14px;border:1.5px solid #e5e5e5;border-radius:8px;font-size:15px;outline:none;transition:border .15s;background:#fafafa}
.field input:focus{border-color:#000;background:#fff}
.btn{width:100%;padding:13px;background:#000;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.btn:hover:not(:disabled){background:#222}
.btn:disabled{opacity:.4;cursor:not-allowed}
.link-row{text-align:center;margin-top:20px;font-size:13px;color:#888}
.link-row a{color:#000;font-weight:700;text-decoration:none}
.link-row a:hover{text-decoration:underline}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;font-weight:600;background:#fff0f0;color:#c0392b;border:1px solid #f5c6c6}
.spinner{width:17px;height:17px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <img class="logo-img" src="/logo.jpeg" alt="Alpha" onerror="this.style.display='none';document.getElementById('logo-txt').style.display='block'">
    <div id="logo-txt" style="display:none">
      <div class="logo-fallback">ALPHA</div>
      <div class="logo-sub">Escola de Jiu-Jitsu</div>
    </div>
  </div>
  <div class="card-body">
    <div class="alert" id="alert-err"></div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn" id="btn" onclick="login()">Entrar</button>
    <div class="link-row">
      Primeira vez? <a href="/cadastro.html">Criar conta</a>
    </div>
    <div class="link-row" style="margin-top:8px">
      <a href="/recuperar-senha.html" style="color:#888;font-weight:400;font-size:12px">Esqueceu a senha?</a>
    </div>
  </div>
</div>
<script>
if (localStorage.getItem('token')) location.href = '/painel.html';
async function login() {
  const btn = document.getElementById('btn');
  const err = document.getElementById('alert-err');
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  err.style.display = 'none';
  if (!email || !senha) { err.textContent='Preencha e-mail e senha.'; err.style.display='block'; return; }
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>Entrando...';
  try {
    const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,senha}) });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Erro no servidor');
    localStorage.setItem('token', data.token);
    localStorage.setItem('role', data.role);
    localStorage.setItem('nome', data.nome);
    location.href = '/painel.html';
  } catch(e) {
    err.textContent = e.message; err.style.display = 'block';
    btn.innerHTML = 'Entrar'; btn.disabled = false;
  }
}
</script>
</body>
</html>
