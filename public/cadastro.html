<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Jiu-Jitsu — Cadastro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.card{background:#fff;border-radius:16px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.card-header{background:#000;padding:28px 32px 20px;text-align:center}
.logo-img{width:180px;height:180px;object-fit:contain;margin-bottom:6px}
.logo-fallback{font-size:30px;font-weight:900;color:#fff;letter-spacing:3px}
.logo-sub{font-size:10px;color:#666;letter-spacing:4px;text-transform:uppercase;margin-top:3px}
.header-title{color:#fff;font-size:13px;margin-top:12px;opacity:.7;font-weight:500}
.card-body{padding:24px 28px 28px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.field input{width:100%;padding:10px 13px;border:1.5px solid #e5e5e5;border-radius:8px;font-size:15px;outline:none;transition:border .15s;background:#fafafa}
.field input:focus{border-color:#000;background:#fff}
.hint{font-size:11px;color:#bbb;margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{width:100%;padding:13px;background:#000;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;transition:background .15s}
.btn:hover:not(:disabled){background:#222}
.btn:disabled{opacity:.4;cursor:not-allowed}
.link-row{text-align:center;margin-top:16px;font-size:13px;color:#888}
.link-row a{color:#000;font-weight:700;text-decoration:none}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;font-weight:600;background:#fff0f0;color:#c0392b;border:1px solid #f5c6c6}
.spinner{width:17px;height:17px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <img class="logo-img" src="/logo.jpeg" alt="Alpha" onerror="this.style.display='none';document.getElementById('logo-txt').style.display='block'">
    <div id="logo-txt" style="display:none">
      <div class="logo-fallback">ALPHA</div>
      <div class="logo-sub">Escola de Jiu-Jitsu</div>
    </div>
    <div class="header-title">Criar conta</div>
  </div>
  <div class="card-body">
    <div class="alert" id="alert-err"></div>
    <div class="field">
      <label>Nome completo</label>
      <input type="text" id="nome" placeholder="Seu nome" autocomplete="name" oninput="validate()">
    </div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="email@exemplo.com" autocomplete="email" oninput="validate()">
    </div>
    <div class="grid2">
      <div class="field">
        <label>Celular</label>
        <input type="tel" id="celular" placeholder="(12) 99999-9999" oninput="maskPhone(this);validate()">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="mín. 6 caracteres" autocomplete="new-password" oninput="validate()">
      </div>
    </div>
    <button class="btn" id="btn" onclick="cadastrar()" disabled>Criar conta →</button>
    <div class="link-row">Já tem conta? <a href="/">Fazer login</a></div>
  </div>
</div>
<script>
if (localStorage.getItem('token')) location.href = '/painel.html';
function maskPhone(el) {
  let v = el.value.replace(/\D/g,'').substring(0,11);
  if (v.length>10) v=v.replace(/^(\d{2})(\d{5})(\d{4}).*/,'($1) $2-$3');
  else if (v.length>6) v=v.replace(/^(\d{2})(\d{4})(\d*)/,'($1) $2-$3');
  else if (v.length>2) v=v.replace(/^(\d{2})(\d*)/,'($1) $2');
  el.value=v;
}
function validate() {
  const nome=document.getElementById('nome').value.trim();
  const email=document.getElementById('email').value.trim();
  const cel=document.getElementById('celular').value.replace(/\D/g,'');
  const senha=document.getElementById('senha').value;
  document.getElementById('btn').disabled=!(nome&&/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)&&cel.length>=10&&senha.length>=6);
}
async function cadastrar() {
  const btn=document.getElementById('btn');
  const err=document.getElementById('alert-err');
  err.style.display='none';
  const payload={
    nome:document.getElementById('nome').value.trim(),
    email:document.getElementById('email').value.trim(),
    cel:document.getElementById('celular').value,
    senha:document.getElementById('senha').value,
  };
  btn.disabled=true; btn.innerHTML='<div class="spinner"></div>Criando...';
  try {
    const r=await fetch('/api/registrar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await r.json();
    if (!r.ok) throw new Error(data.error||'Erro no servidor');
    document.querySelector('.card-body').innerHTML=`
      <div style="text-align:center;padding:16px 0">
        <div style="font-size:44px;margin-bottom:16px">📧</div>
        <h2 style="font-size:18px;font-weight:700;color:#000;margin-bottom:10px">Verifique seu e-mail</h2>
        <p style="font-size:14px;color:#666;line-height:1.6;margin-bottom:20px">
          Enviamos um link de confirmação para <strong>${payload.email}</strong>.<br>
          Clique nele para ativar sua conta.
        </p>
        <a href="/" style="display:inline-block;padding:11px 24px;background:#000;color:#fff;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none">Ir para o login</a>
      </div>`;
  } catch(e) {
    err.textContent=e.message; err.style.display='block';
    btn.innerHTML='Criar conta →'; validate();
  }
}
</script>
</body>
</html>
